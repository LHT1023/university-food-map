<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃什么 · 大学城美食地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF6B35;
    --primary-light: #FF8F65;
    --primary-dark: #E55A25;
    --secondary: #2EC4B6;
    --secondary-light: #5DD9CE;
    --accent: #FFBE0B;
    --bg: #FFF8F0;
    --bg-card: #FFFFFF;
    --bg-dark: #1A1A2E;
    --text: #2D2D3A;
    --text-light: #6B6B80;
    --text-muted: #9B9BAF;
    --border: #F0EBE3;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --shadow-glow: 0 4px 30px rgba(255,107,53,0.15);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,248,240,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    color: var(--primary);
    cursor: pointer;
    user-select: none;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px rgba(255,107,53,0.3);
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: #F5F0E8;
    padding: 4px;
    border-radius: 14px;
  }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    background: transparent;
    color: var(--text-light);
    white-space: nowrap;
  }
  .nav-tab.active {
    background: white;
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }
  .nav-tab:hover:not(.active) {
    color: var(--text);
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: #F5F0E8;
    border-radius: 12px;
    padding: 8px 14px;
    gap: 8px;
    width: 220px;
    transition: all 0.3s ease;
  }
  .search-box:focus-within {
    background: white;
    box-shadow: 0 0 0 2px var(--primary-light);
    width: 280px;
  }
  .search-box input {
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    width: 100%;
    color: var(--text);
    font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .avatar-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    border: none;
    color: white;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(46,196,182,0.3);
  }

  /* ===== HERO ===== */
  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 20px;
    position: relative;
  }
  .hero-content {
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }
  .hero h1 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 42px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .hero h1 span { color: var(--primary); }
  .hero p {
    font-size: 16px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Random Pick Button */
  .random-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow-glow);
    transition: all 0.3s ease;
    font-family: inherit;
    animation: pulse-glow 2s infinite;
  }
  .random-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 35px rgba(255,107,53,0.3);
  }
  .random-btn:active { transform: scale(0.98); }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 4px 30px rgba(255,107,53,0.15); }
    50% { box-shadow: 0 4px 30px rgba(255,107,53,0.35); }
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: white;
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-light);
    border: 1px solid var(--border);
  }
  .stat-chip .num {
    font-weight: 700;
    color: var(--primary);
  }

  /* ===== UNIVERSITY TABS ===== */
  .uni-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 16px;
  }
  .uni-tabs {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .uni-tabs::-webkit-scrollbar { display: none; }
  .uni-tab {
    flex-shrink: 0;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-light);
    font-family: inherit;
  }
  .uni-tab.active {
    border-color: var(--primary);
    background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,190,11,0.05));
    color: var(--primary);
  }
  .uni-tab:hover:not(.active) {
    border-color: var(--primary-light);
    color: var(--text);
  }
  .uni-tab .uni-emoji { font-size: 18px; }

  /* ===== FILTER BAR ===== */
  .filter-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 20px;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    white-space: nowrap;
  }
  .filter-chip.active {
    border-color: var(--primary);
    background: rgba(255,107,53,0.08);
    color: var(--primary);
  }
  .filter-chip:hover:not(.active) {
    border-color: #ddd;
    color: var(--text);
  }
  .filter-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .sort-btn {
    margin-left: auto;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-light);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.2s ease;
  }
  .sort-btn:hover { border-color: #ddd; color: var(--text); }

  /* ===== MAIN CONTENT ===== */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 40px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }

  /* ===== RESTAURANT GRID ===== */
  .restaurant-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .restaurant-card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    border: 1px solid var(--border);
    position: relative;
  }
  .restaurant-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: transparent;
  }
  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    position: relative;
    overflow: hidden;
  }
  .card-img-placeholder {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }
  .card-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .badge-hot {
    background: rgba(255,107,53,0.9);
    color: white;
  }
  .badge-new {
    background: rgba(46,196,182,0.9);
    color: white;
  }
  .badge-cheap {
    background: rgba(255,190,11,0.9);
    color: var(--text);
  }
  .card-fav {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    z-index: 2;
    border: none;
    transition: all 0.2s ease;
  }
  .card-fav:hover { transform: scale(1.15); }
  .card-fav.active { background: rgba(255,107,53,0.15); }
  .card-body {
    padding: 14px 16px 16px;
  }
  .card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    margin-right: 8px;
  }
  .card-rating {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }
  .card-tags {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .card-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: #F5F0E8;
    color: var(--text-light);
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-price {
    font-weight: 700;
    color: var(--primary-dark);
    font-size: 14px;
  }
  .card-price span {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ===== MAP PANEL ===== */
  .map-panel {
    position: sticky;
    top: 88px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
  }
  .map-container {
    width: 100%;
    height: 380px;
    background: linear-gradient(145deg, #E8F4E8, #D4E8D4);
    position: relative;
    overflow: hidden;
  }
  /* Simple illustrated map */
  .map-bg {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .map-road {
    position: absolute;
    background: rgba(255,255,255,0.7);
    border-radius: 2px;
  }
  .map-road.h {
    height: 3px;
    left: 0;
    right: 0;
  }
  .map-road.v {
    width: 3px;
    top: 0;
    bottom: 0;
  }
  .map-pin {
    position: absolute;
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 5;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .map-pin span {
    transform: rotate(45deg);
    font-size: 11px;
  }
  .map-pin:hover {
    transform: rotate(-45deg) scale(1.3);
    z-index: 10;
  }
  .map-pin.active {
    transform: rotate(-45deg) scale(1.4);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .map-uni-label {
    position: absolute;
    padding: 4px 10px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    z-index: 3;
    box-shadow: var(--shadow-sm);
  }
  .map-legend {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-light);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* ===== DETAIL PANEL (overlay) ===== */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .detail-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .detail-card {
    background: white;
    border-radius: var(--radius-xl);
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    position: relative;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .detail-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: all 0.2s;
  }
  .detail-close:hover { background: white; transform: scale(1.1); }
  .detail-img {
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    position: relative;
  }
  .detail-body {
    padding: 24px;
  }
  .detail-name {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .detail-rating-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .detail-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
  }
  .detail-reviews {
    font-size: 13px;
    color: var(--text-muted);
  }
  .detail-price-tag {
    padding: 4px 12px;
    border-radius: 8px;
    background: rgba(255,107,53,0.1);
    color: var(--primary);
    font-weight: 700;
    font-size: 14px;
  }
  .detail-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .detail-info-item {
    padding: 12px;
    background: #FAF7F2;
    border-radius: var(--radius-sm);
  }
  .detail-info-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .detail-info-value {
    font-size: 14px;
    font-weight: 600;
  }
  .detail-section-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }
  .detail-reco-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .reco-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: #FAF7F2;
    border-radius: var(--radius-sm);
  }
  .reco-name {
    font-size: 14px;
    font-weight: 500;
  }
  .reco-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,190,11,0.2);
    color: #B8860B;
    font-weight: 600;
  }
  .detail-reviews-section { margin-bottom: 10px; }
  .review-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .review-item:last-child { border-bottom: none; }
  .review-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .review-user {
    font-size: 13px;
    font-weight: 600;
  }
  .review-date {
    font-size: 11px;
    color: var(--text-muted);
  }
  .review-stars {
    color: var(--accent);
    font-size: 12px;
    margin-bottom: 4px;
  }
  .review-text {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.5;
  }

  /* ===== RANDOM MODAL ===== */
  .random-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  .random-overlay.show { display: flex; }
  .random-modal {
    background: white;
    border-radius: var(--radius-xl);
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s ease;
  }
  .random-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-20px); }
    60% { transform: translateY(-10px); }
  }
  .random-title {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 26px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .random-subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
  }
  .random-info {
    text-align: left;
    padding: 16px;
    background: #FAF7F2;
    border-radius: var(--radius-md);
    margin-bottom: 20px;
  }
  .random-info-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 14px;
  }
  .random-info-label { color: var(--text-muted); }
  .random-info-value { font-weight: 600; }
  .random-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .random-actions button {
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s ease;
  }
  .btn-retry {
    background: #F5F0E8;
    color: var(--text);
  }
  .btn-retry:hover { background: #EDE7DD; }
  .btn-go {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    box-shadow: var(--shadow-glow);
  }
  .btn-go:hover { transform: translateY(-1px); }
  .btn-close-random {
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 30px 24px;

let currentUni = 'all';
let currentCuisine = 'all';
let currentPrice = null;
let currentSort = 'default'; // default, rating, price-asc, price-desc
let searchQuery = '';
let favorites = new Set();
let currentTab = 'explore';

// ===== RENDER FUNCTIONS =====

function getFilteredRestaurants() {
  let filtered = [...restaurants];

  // Tab filter
  if (currentTab === 'favorites') {
    filtered = filtered.filter(r => favorites.has(r.id));
  }
  if (currentTab === 'ranking') {
    filtered = [...restaurants].sort((a, b) => b.rating - a.rating || b.reviews - a.reviews);
  }

  // Uni filter
  if (currentUni !== 'all') {
    filtered = filtered.filter(r => r.uni === currentUni);
  }

  // Cuisine filter
  if (currentCuisine !== 'all') {
    filtered = filtered.filter(r => r.cuisine === currentCuisine);
  }

  // Price filter
  if (currentPrice === 'cheap') filtered = filtered.filter(r => r.price <= 15);
  else if (currentPrice === 'mid') filtered = filtered.filter(r => r.price > 15 && r.price <= 30);
  else if (currentPrice === 'high') filtered = filtered.filter(r => r.price > 30);

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.tags.some(t => t.toLowerCase().includes(q)) ||
      r.cuisine.includes(q)
    );
  }

  // Sort
  if (currentSort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
  else if (currentSort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
  else if (currentSort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
  else if (currentSort === 'reviews') filtered.sort((a, b) => b.reviews - a.reviews);

  return filtered;
}

        <div style="font-size:14px;color:var(--text-muted);">换个筛选条件试试？</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map((r, i) => `
    <div class="restaurant-card card-enter" style="animation-delay:${i * 0.06}s" onclick="openDetail(${r.id})">
      ${r.badge ? `<div class="card-badge badge-${r.badge}">${r.badge === 'hot' ? '🔥 人气' : r.badge === 'new' ? '✨ 新店' : '💰 平价'}</div>` : ''}
      <button class="card-fav ${favorites.has(r.id) ? 'active' : ''}" onclick="event.stopPropagation();toggleFav(${r.id})">
        ${favorites.has(r.id) ? '❤️' : '🤍'}
      </button>
      <div class="card-img-placeholder" style="background:${r.bg}">${r.emoji}</div>
      <div class="card-body">
        <div class="card-top-row">
          <div class="card-name">${r.name}</div>
          <div class="card-rating">⭐ ${r.rating}</div>
        </div>
        <div class="card-tags">
          ${r.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
        </div>
        <div class="card-meta">
          <div class="card-price">¥${r.price}<span>/人</span></div>
          <div>📍 ${r.distance}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderMap() {
  const map = document.getElementById('mapContainer');
  const filtered = getFilteredRestaurants();

  const pinColor = (cuisine) => {
    if (['chinese','noodle','hotpot','bbq','fastfood'].includes(cuisine)) return 'var(--primary)';
    if (['japanese','korean'].includes(cuisine)) return 'var(--secondary)';
    if (['western','dessert'].includes(cuisine)) return 'var(--accent)';
    return '#9B59B6';
  };

  map.innerHTML = `
    <div class="map-bg">
      <!-- Roads -->
      <div class="map-road h" style="top:30%"></div>
      <div class="map-road h" style="top:55%"></div>
      <div class="map-road h" style="top:80%"></div>
      <div class="map-road v" style="left:20%"></div>
      <div class="map-road v" style="left:45%"></div>
      <div class="map-road v" style="left:70%"></div>

      <!-- Uni Labels -->
      <div class="map-uni-label" style="top:15%;left:10%">🏛️ 华夏大学</div>
      <div class="map-uni-label" style="top:10%;left:50%">📚 明德大学</div>
      <div class="map-uni-label" style="top:48%;left:30%">🔬 科技学院</div>
      <div class="map-uni-label" style="top:22%;left:72%">🎨 艺术学院</div>
      <div class="map-uni-label" style="top:68%;left:12%">✏️ 师范大学</div>

      <!-- Pins -->
      ${filtered.map(r => `
        <div class="map-pin" style="left:${r.mapX}%;top:${r.mapY}%;background:${pinColor(r.cuisine)}"
             onclick="openDetail(${r.id})" title="${r.name}">
          <span>${r.emoji}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ===== DETAIL =====
function openDetail(id) {
  const r = restaurants.find(x => x.id === id);
  if (!r) return;
  const card = document.getElementById('detailCard');
  const uniNames = { huaxia: '华夏大学', mingde: '明德大学', keji: '科技学院', yishu: '艺术学院', shifan: '师范大学' };

  card.innerHTML = `
    <button class="detail-close" onclick="document.getElementById('detailOverlay').classList.remove('show')">✕</button>
    <div class="detail-img" style="background:${r.bg}">${r.emoji}</div>
    <div class="detail-body">
      <div class="detail-name">${r.name}</div>
      <div class="detail-rating-row">
        <div class="detail-rating">⭐ ${r.rating}</div>
        <div class="detail-reviews">${r.reviews} 条评价</div>
        <div class="detail-price-tag">¥${r.price}/人</div>
      </div>
      <div class="detail-info-grid">
        <div class="detail-info-item">
          <div class="detail-info-label">📍 地址</div>
          <div class="detail-info-value">${r.address}</div>
        </div>
        <div class="detail-info-item">
          <div class="detail-info-label">🕐 营业时间</div>
          <div class="detail-info-value">${r.time}</div>
        </div>
        <div class="detail-info-item">
          <div class="detail-info-label">🏫 所属高校</div>
          <div class="detail-info-value">${uniNames[r.uni]}</div>
        </div>
        <div class="detail-info-item">
          <div class="detail-info-label">📏 距离</div>
          <div class="detail-info-value">${r.distance}</div>
        </div>
      </div>

      <div class="detail-section-title">🍽️ 推荐菜品</div>
      <div class="detail-reco-list">
        ${r.recommended.map(item => `
          <div class="reco-item">
            <span class="reco-name">${item.name}</span>
            <span class="reco-tag">${item.tag}</span>
          </div>
        `).join('')}
      </div>

      <div class="detail-section-title">💬 学生点评</div>
      <div class="detail-reviews-section">
        ${r.reviewList.map(rv => `
          <div class="review-item">
            <div class="review-header">
              <span class="review-user">${rv.user}</span>
              <span class="review-date">${rv.date}</span>
            </div>
            <div class="review-stars">${'⭐'.repeat(rv.stars)}</div>
            <div class="review-text">${rv.text}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('show');
  }
}

// ===== RANDOM PICK =====
function randomPick() {
  const pool = getFilteredRestaurants();
  if (pool.length === 0) return;
  const r = pool[Math.floor(Math.random() * pool.length)];
  const uniNames = { huaxia: '华夏大学', mingde: '明德大学', keji: '科技学院', yishu: '艺术学院', shifan: '师范大学' };

  const modal = document.getElementById('randomModal');
  modal.classList.add('spinning');
  modal.innerHTML = `
    <div class="random-emoji">${r.emoji}</div>
    <div class="random-title">${r.name}</div>
    <div class="random-subtitle">就决定是你了！</div>
    <div class="random-info">
      <div class="random-info-row">
        <span class="random-info-label">人均</span>
        <span class="random-info-value">¥${r.price}</span>
      </div>
      <div class="random-info-row">
        <span class="random-info-label">评分</span>
        <span class="random-info-value">⭐ ${r.rating}（${r.reviews}条）</span>
      </div>
      <div class="random-info-row">
        <span class="random-info-label">距离</span>
        <span class="random-info-value">${r.distance}</span>
      </div>
      <div class="random-info-row">
        <span class="random-info-label">所属高校</span>
        <span class="random-info-value">${uniNames[r.uni]}</span>
      </div>
    </div>
    <div class="random-actions">
      <button class="btn-retry" onclick="randomPick()">🎲 再来一次</button>
      <button class="btn-go" onclick="document.getElementById('randomOverlay').classList.remove('show');openDetail(${r.id})">查看详情 →</button>
    </div>
    <div style="margin-top:10px">
      <button class="btn-close-random" onclick="document.getElementById('randomOverlay').classList.remove('show')">算了我再看看</button>
    </div>
  `;
  setTimeout(() => modal.classList.remove('spinning'), 600);
  document.getElementById('randomOverlay').classList.add('show');
}

function closeRandom(e) {
  if (e.target === document.getElementById('randomOverlay')) {
    document.getElementById('randomOverlay').classList.remove('show');
  }
}

// ===== FAVORITES =====
function toggleFav(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  renderCards();
}

// ===== SEARCH =====
function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  renderCards();
  renderMap();
}

// ===== SORT =====
const sortModes = ['default', 'rating', 'reviews', 'price-asc', 'price-desc'];
const sortLabels = { default: '综合排序', rating: '评分最高', reviews: '评价最多', 'price-asc': '价格最低', 'price-desc': '价格最高' };
let sortIndex = 0;
function toggleSort() {
  sortIndex = (sortIndex + 1) % sortModes.length;
  currentSort = sortModes[sortIndex];
  document.getElementById('sortText').textContent = sortLabels[currentSort];
  renderCards();
}

// ===== EVENT BINDINGS =====
function goHome() {
  currentTab = 'explore';
  currentUni = 'all';
  currentCuisine = 'all';
  currentPrice = null;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  updateAll();
}

// Nav tabs
document.getElementById('navTabs').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  renderCards();
  renderMap();
});

// Uni tabs
document.getElementById('uniTabs').addEventListener('click', e => {
  const tab = e.target.closest('.uni-tab');
  if (!tab) return;
  document.querySelectorAll('.uni-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentUni = tab.dataset.uni;
  renderCards();
  renderMap();
});

// Filter chips
document.getElementById('filterRow').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;

  if (chip.dataset.cuisine) {
    document.querySelectorAll('[data-cuisine]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentCuisine = chip.dataset.cuisine;
  }
  if (chip.dataset.price) {
    const wasActive = chip.classList.contains('active');
    document.querySelectorAll('[data-price]').forEach(c => c.classList.remove('active'));
    if (!wasActive) {
      chip.classList.add('active');
      currentPrice = chip.dataset.price;
    } else {
      currentPrice = null;
    }
  }
  renderCards();
  renderMap();
});

function updateAll() {
  // reset UI
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
  document.querySelectorAll('.uni-tab').forEach(t => t.classList.toggle('active', t.dataset.uni === currentUni));
  document.querySelectorAll('[data-cuisine]').forEach(c => c.classList.toggle('active', c.dataset.cuisine === currentCuisine));
  document.querySelectorAll('[data-price]').forEach(c => c.classList.remove('active'));
  renderCards();
  renderMap();
}

// Initial render
renderCards();
renderMap();
</script>
</body>
